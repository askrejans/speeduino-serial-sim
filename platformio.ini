; PlatformIO Project Configuration File
;
; Speeduino Serial Simulator - Cross-platform ECU simulator
; Supports: Arduino AVR, ESP32 (including S2, S3), ESP8266
;
; Build: pio run -e <environment>
; Upload: pio run -e <environment> -t upload
; Test: pio test -e <environment> (requires hardware connected)
; Monitor: pio device monitor

[platformio]
default_envs = esp32s2
src_dir = src
include_dir = include
test_dir = test
lib_dir = lib
data_dir = data

; Common settings for all environments
[env]
framework = arduino
monitor_speed = 115200
monitor_filters = default
build_flags = 
    -Wall
    -Wextra
    -D MONITOR_SPEED=115200
lib_ldf_mode = deep+
test_framework = unity
test_build_src = yes

; ============================================
; Arduino AVR Environments (Minimal Features)
; ============================================

[env:uno]
platform = atmelavr
board = uno
build_flags = 
    ${env.build_flags}
    -D ARDUINO_AVR
    -D MINIMAL_FEATURES
lib_deps =

[env:mega]
platform = atmelavr
board = megaatmega2560
build_flags = 
    ${env.build_flags}
    -D ARDUINO_AVR
    -D MINIMAL_FEATURES
lib_deps =

[env:nano]
platform = atmelavr
board = nanoatmega328
build_flags = 
    ${env.build_flags}
    -D ARDUINO_AVR
    -D MINIMAL_FEATURES
lib_deps =

; ============================================
; ESP32 Environments (Full Features + WiFi)
; ============================================

[env:esp32]
platform = espressif32
board = esp32dev
build_flags = 
    ${env.build_flags}
    -D ESP32
    -D ENABLE_WIFI
    -D ENABLE_WEB_INTERFACE
    -D ADVANCED_SIMULATION
lib_deps = 
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    bblanchon/ArduinoJson @ ^6.21.3

