; PlatformIO Project Configuration File
;
; Speeduino Serial Simulator - Cross-platform ECU simulator
; Supports: Arduino AVR, ESP32 (including S2, S3), ESP8266
;
; Build: pio run -e <environment>
; Upload: pio run -e <environment> -t upload
; Test: pio test -e <environment> (requires hardware connected)
; Monitor: pio device monitor

[platformio]
default_envs = esp32s3
src_dir = src
include_dir = include
test_dir = test
lib_dir = lib
data_dir = data

; Common settings for all environments
[env]
framework = arduino
monitor_speed = 115200
monitor_filters = default
build_flags = 
    -Wall
    -Wextra
    -D MONITOR_SPEED=115200
lib_ldf_mode = deep+
test_framework = unity
test_build_src = yes

; ============================================
; Arduino AVR Environments (Minimal Features)
; ============================================
; Basic serial-only operation for memory-constrained devices
; Features: Basic engine simulation + Speeduino protocol (A, Q, V, S, n)
; No WiFi, no web interface, no WiFi serial
; Example use: Testing with TunerStudio over hardware UART

[env:uno]
platform = atmelavr
board = uno
build_flags = 
    ${env.build_flags}
    -D ARDUINO_AVR
    -D MINIMAL_FEATURES
lib_deps =

[env:mega]
platform = atmelavr
board = megaatmega2560
build_flags = 
    ${env.build_flags}
    -D ARDUINO_AVR
    -D MINIMAL_FEATURES
lib_deps =

[env:nano]
platform = atmelavr
board = nanoatmega328
build_flags = 
    ${env.build_flags}
    -D ARDUINO_AVR
    -D MINIMAL_FEATURES
lib_deps =

; ============================================
; ESP32 Environments (Full Features + WiFi)
; ============================================
; Full-featured builds with WiFi AP, web dashboard, REST API
; Features: Advanced simulation + WiFi + Web interface
; Serial: Hardware UART (Serial)
; Web: HTTP dashboard at 192.168.4.1 for monitoring/control
; Example use: Standalone simulator with web-based tuning

[env:esp32]
platform = espressif32@6.9.0
board = esp32dev
build_flags = 
    ${env.build_flags}
    -D ESP32
    -D SOC_WIFI_SUPPORTED=1
    -D ENABLE_WIFI
    -D ENABLE_WEB_INTERFACE
    -D ADVANCED_SIMULATION
lib_deps = 
    https://github.com/mathieucarbou/ESPAsyncWebServer.git#v3.6.0
    https://github.com/mathieucarbou/AsyncTCP.git#v3.3.2
    bblanchon/ArduinoJson @ ^7.2.2

[env:esp32-wrover]
platform = espressif32@6.9.0
board = esp-wrover-kit
build_flags = 
    ${env.build_flags}
    -D ESP32
    -D SOC_WIFI_SUPPORTED=1
    -D ENABLE_WIFI
    -D ENABLE_WEB_INTERFACE
    -D ADVANCED_SIMULATION
lib_deps = 
    https://github.com/mathieucarbou/ESPAsyncWebServer.git#v3.6.0
    https://github.com/mathieucarbou/AsyncTCP.git#v3.3.2
    bblanchon/ArduinoJson @ ^7.2.2

[env:esp32s2]
platform = espressif32@6.9.0
board = esp32-s2-saola-1
build_flags = 
    ${env.build_flags}
    -D ESP32
    -D SOC_WIFI_SUPPORTED=1
    -D ENABLE_WIFI
    -D ENABLE_WEB_INTERFACE
    -D ADVANCED_SIMULATION
lib_deps = 
    https://github.com/mathieucarbou/ESPAsyncWebServer.git#v3.6.0
    https://github.com/mathieucarbou/AsyncTCP.git#v3.3.2
    bblanchon/ArduinoJson @ ^7.2.2

; ============================================
; ESP32-S3 Environment (All Features + WiFi Serial Socket)
; ============================================
; Full-featured build with WiFi serial socket (TCP/IP as UART replacement)
; Features: Advanced simulation + WiFi + Web interface + WiFi Serial
; Serial: TCP socket on port 5000 (ENABLE_WIFI_SERIAL)
; Web: HTTP dashboard at 192.168.4.1
; Monitor: Hardware UART (Serial) for debug logging
; Example use: Remote TunerStudio connection over network, web control panel
; Connect TunerStudio to: <IP>:5000 using TCP/IP instead of COM port

[env:esp32s3]
platform = espressif32@6.9.0
board = seeed_xiao_esp32s3
upload_protocol = esptool
upload_speed = 460800
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
build_flags = 
    ${env.build_flags}
    -D ESP32
    -D SOC_WIFI_SUPPORTED=1
    -D ENABLE_WIFI
    -D ENABLE_WIFI_SERIAL
    -D ENABLE_WEB_INTERFACE
    -D ADVANCED_SIMULATION
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps = 
    https://github.com/mathieucarbou/ESPAsyncWebServer.git#v3.6.0
    https://github.com/mathieucarbou/AsyncTCP.git#v3.3.2
    bblanchon/ArduinoJson @ ^7.2.2

; ============================================
; ESP8266 Environments (Full Features + WiFi)
; ============================================
; Full-featured builds with WiFi AP, web dashboard, REST API
; Features: Advanced simulation + WiFi + Web interface
; Serial: Hardware UART (Serial)
; Web: HTTP dashboard at 192.168.4.1
; Note: Add -D ENABLE_WIFI_SERIAL to enable TCP socket serial (port 5000)

[env:esp8266]
platform = espressif8266
board = nodemcuv2
build_flags = 
    ${env.build_flags}
    -D ESP8266
    -D SOC_WIFI_SUPPORTED=1
    -D ENABLE_WIFI
    -D ENABLE_WEB_INTERFACE
    -D ADVANCED_SIMULATION
lib_deps = 
    https://github.com/mathieucarbou/ESPAsyncWebServer.git#v3.6.0
    https://github.com/mathieucarbou/AsyncTCP.git#v3.3.2
    bblanchon/ArduinoJson @ ^7.2.2

[env:d1_mini]
platform = espressif8266
board = d1_mini
build_flags = 
    ${env.build_flags}
    -D ESP8266
    -D SOC_WIFI_SUPPORTED=1
    -D ENABLE_WIFI
    -D ENABLE_WEB_INTERFACE
    -D ADVANCED_SIMULATION
lib_deps = 
    https://github.com/mathieucarbou/ESPAsyncWebServer.git#v3.6.0
    https://github.com/mathieucarbou/AsyncTCP.git#v3.3.2
    bblanchon/ArduinoJson @ ^7.2.2
